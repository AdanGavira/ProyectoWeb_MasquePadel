<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda - MasquePadel</title>
    <!-- Atento a los ../, están bien configurados para salir de /shop y entrar a /css -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <script src="../js/menu.js"></script>
    <style>
        .tienda-container { max-width: 1200px; margin: 150px auto 50px auto; padding: 20px; } /* Añadido un margen superior grande para que la cabecera no lo tape */
        .tienda-titulo { text-align: center; color: #1e3c72; margin-bottom: 40px; font-size: 32px; }

        .rejilla-productos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .tarjeta-producto {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }
        .tarjeta-producto:hover { transform: translateY(-5px); box-shadow: 0 6px 15px rgba(0,0,0,0.2); }

        .tarjeta-foto {
            width: 100%;
            height: 200px;
            background-color: #f1f2f6; 
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-style: italic;
            border-bottom: 1px solid #eee;
        }

        .tarjeta-info { padding: 20px; text-align: center; flex-grow: 1; display:flex; flex-direction: column; }
        .producto-categoria { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .producto-nombre { font-size: 18px; color: #333; margin: 0 0 10px 0; font-weight: bold; }
        .producto-desc { font-size: 14px; color: #666; margin-bottom: 15px; flex-grow: 1;}
        .producto-precio { font-size: 22px; color: #ff4500; font-weight: bold; margin-bottom: 15px; }
        .btn-comprar { background: #1e3c72; color: #fff; padding: 12px; border: none; border-radius: 5px; font-size: 14px; cursor: pointer; transition: 0.2s; font-weight: bold;}
        .btn-comprar:hover { background: #ff4500; }
        #mensaje-carga { text-align: center; font-size: 18px; color: #666; width: 100%; grid-column: 1 / -1; }
    </style>
</head>
<body id="productos-page">

    <!-- EL NUEVO MENÚ TRANSPARENTE EN CON TEXTO NEGRO PARA LA TIENDA -->
    <header>
        <div class="menu" style="background-color: #1a1a1a;"> <!-- Aquí le ponemos fondo sólido oscuro porque esta página no tiene foto gigante -->
            <div>
                <a href="../index.html" class="logo">MasquePadel</a>
            </div>
            <button onclick="myFunction()" class="menu-responsive" style="color: white;">&#9776;</button> 

            <nav id="mi-menu" class="navbar">
                <ul>
                    <li><a href="../index.html">Inicio</a></li> <!-- Salimos de shop hacia atrás -->
                    <li><a href="../pages/instalaciones.html">Instalaciones</a></li> <!-- Salimos de shop y entramos a pages -->
                    <li><a href="../pages/reservas.html">Reserva Pistas</a></li>
                    <li><a href="productos.html">Productos</a></li>
                    <li><a href="../pages/galeria.html">Galería</a></li>
                    <li><a href="../pages/contacto.html">Contacto</a></li>
                    <li class="btn-usuario"><a href="#">Iniciar Sesión</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- EL ESCAPARATE -->
    <main class="tienda-container">
        <h2 class="tienda-titulo">🛒 Tienda Oficial MasquePadel</h2>
        <div id="escaparate-central" class="rejilla-productos">
            <p id="mensaje-carga">Conectando con el almacén central...</p>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container footer-txt" style="text-align: center; padding: 30px 0;">
            <h2>MasquePadel Sevilla</h2>
            <p>Email: <a href="mailto:masquepadel@masquepadel.com">masquepadel@masquepadel.com</a></p>
        </div>
    </footer>

    <!-- SCRIPT ORIGINAL INTACTO -->
    <script>
        document.addEventListener("DOMContentLoaded", async function() {
            const token = localStorage.getItem('token_masquepadel');
            const emailUsuario = localStorage.getItem('usuario_email');

            if (token && emailUsuario) {
                const btnMenu = document.querySelector('.btn-usuario a');
                if(btnMenu) {
                    btnMenu.href = "#";
                    btnMenu.innerHTML = `👋 Hola, ${emailUsuario.split('@')[0]}`;
                }
            }

            const escaparate = document.getElementById('escaparate-central');
            try {
                // LLAMAMOS AL CONTROLADOR DE NODE.JS a través de tu API (Nota: si subes a Render, esto de localhost no funcionará en producción, lo trataremos más adelante).
                const respuesta = await fetch('http://localhost:4000/api/productos/todos');
                const catalogoBaseDatos = await respuesta.json();

                escaparate.innerHTML = ""; 

                catalogoBaseDatos.forEach(articulo => {
                    const tarjeta = document.createElement('div');
                    tarjeta.className = "tarjeta-producto";
                    tarjeta.innerHTML = `
                        <div class="tarjeta-foto">[ Foto: ${articulo.imagen_url} ]</div>
                        <div class="tarjeta-info">
                            <span class="producto-categoria">${articulo.categoria}</span>
                            <h3 class="producto-nombre">${articulo.nombre}</h3>
                            <p class="producto-desc">${articulo.descripcion}</p>
                            <div class="producto-precio">${articulo.precio} €</div>
                            <button class="btn-comprar" onclick="añadirAlCarrito('${articulo.nombre}')">Añadir al Carrito</button>
                        </div>
                    `;
                    escaparate.appendChild(tarjeta);
                });
            } catch (error) {
                escaparate.innerHTML = "<p style='color:red; text-align:center; width:100%; grid-column: 1 / -1;'>Error al cargar inventario: No podemos conectar con el servidor.</p>";
            }
        });

        function añadirAlCarrito(nombreProducto) {
            const token = localStorage.getItem('token_masquepadel');
            if(!token) {
                alert("Debes iniciar sesión para comprar en la tienda.");
                window.location.href = "../pages/login.html"; // Ajustado para ir a pages/
                return;
            }
            alert(`🛒 ¡Bolsa actualizada! Has añadido: ${nombreProducto}`);
        }
    </script>
</body>
</html>
